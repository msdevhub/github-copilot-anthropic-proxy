<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Soft rounded backdrop, light translucent -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#f5f5f7" fill-opacity="0.6" stroke="#d8d8dc" stroke-width="1"/>

  <!-- Left half: Copilot blue -->
  <path d="M14 20 Q14 16 18 16 L30 16 L30 48 L18 48 Q14 48 14 44 Z" fill="#0a84ff"/>
  <!-- Right half: Claude/Anthropic terracotta -->
  <path d="M34 16 L46 16 Q50 16 50 20 L50 44 Q50 48 46 48 L34 48 Z" fill="#d97757"/>

  <!-- Interlocking gap with arrows showing bidirectional proxy -->
  <g fill="#ffffff">
    <!-- right-pointing arrow (top half) -->
    <path d="M28 22 L34 27 L28 32 Z" opacity="0.95"/>
    <!-- left-pointing arrow (bottom half) -->
    <path d="M36 32 L30 37 L36 42 Z" opacity="0.95"/>
  </g>
</svg>
